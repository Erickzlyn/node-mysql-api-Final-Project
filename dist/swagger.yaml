openapi: 3.0.0
info:
  title: Node MySQL API
  version: 1.0.0
servers:
  - url: https://node-mysql-api-final-project.onrender.com
paths:
  /accounts/register:
    post:
      summary: Register a new account
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, firstName, lastName, email, password, confirmPassword, acceptTerms]
              properties:
                title:
                  type: string
                  example: Mr
                firstName:
                  type: string
                  example: Erick
                lastName:
                  type: string
                  example: Lyndon
                email:
                  type: string
                  example: test@gmail.com
                password:
                  type: string
                  example: password123
                confirmPassword:
                  type: string
                  example: password123
                acceptTerms:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Registration successful
        '400':
          description: Bad request

  /accounts/verify-email:
    post:
      summary: Verify email address
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Verification successful
        '400':
          description: Invalid token

  /accounts/authenticate:
    post:
      summary: Login
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: test@gmail.com
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: Login successful
        '400':
          description: Invalid credentials

  /accounts/refresh-token:
    post:
      summary: Refresh JWT token
      tags: [Accounts]
      responses:
        '200':
          description: Token refreshed

  /accounts/revoke-token:
    post:
      summary: Revoke token (logout)
      tags: [Accounts]
      responses:
        '200':
          description: Token revoked

  /accounts/forgot-password:
    post:
      summary: Forgot password
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: test@gmail.com
      responses:
        '200':
          description: Reset email sent

  /accounts/validate-reset-token:
    post:
      summary: Validate reset token
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token is valid

  /accounts/reset-password:
    post:
      summary: Reset password
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, confirmPassword]
              properties:
                token:
                  type: string
                password:
                  type: string
                confirmPassword:
                  type: string
      responses:
        '200':
          description: Password reset successful

  /accounts:
    get:
      summary: Get all accounts (Admin only)
      tags: [Accounts]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of accounts
        '401':
          description: Unauthorized
    post:
      summary: Create account (Admin only)
      tags: [Accounts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Account created

  /accounts/{id}:
    get:
      summary: Get account by ID
      tags: [Accounts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account details
    put:
      summary: Update account
      tags: [Accounts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Account updated
    delete:
      summary: Delete account
      tags: [Accounts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account deleted

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT